        * {

            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: #0c0e1a;
            color: #e8ebf2;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {

            margin: 0 auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        .top-bar {
            background: rgba(25, 28, 48, 0.85);

            border-bottom: 1px solid rgba(138, 108, 255, 0.2);
            padding: 8px 0;
            font-size: 14px;
        }
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-info span {
            margin-right: 20px;
            color: #b0b8d4;
        }
        .theme-switch {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: linear-gradient(135deg,#6344e8,#a864ff);
            font-size: 13px;
        }
        .top-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .collapse-btn {
            background: rgba(138, 108, 255, 0.3);
            border: 1px solid rgba(138, 108, 255, 0.5);
            color: #c0b4ff;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .collapse-btn:hover {
            background: linear-gradient(135deg, #6344e8, #a864ff);
            color: white;
            transform: scale(1.1);
        }
        .top-bar.collapsed {
            height: 0;
            padding: 0;
            overflow: hidden;
            border: none;
        }
        .top-bar.collapsed .container {
            display: none;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .expand-top-btn {
            background: rgba(138, 108, 255, 0.3);
            border: 1px solid rgba(138, 108, 255, 0.5);
            color: #c0b4ff;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .expand-top-btn:hover {
            background: linear-gradient(135deg, #6344e8, #a864ff);
            color: white;
        }

        .header {
            background: rgba(18, 21, 39, 0.75);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(124, 92, 255, 0.18);
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
            flex-wrap: wrap;
            gap:15px;
            padding:10px 0;
        }
        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg,#7c62ff,#e288ff);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .nav-menu a {
            color: #c5cbe8;
            margin: 0 8px;
            padding: 7px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            display:inline-block;
        }
        .nav-menu a:hover {
            background: rgba(124, 92, 255, 0.25);
            color: #fff;
            box-shadow: 0 0 12px rgba(124, 92, 255, 0.35);
        }
        .login-btn {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .sign-btn {
            background: linear-gradient(135deg,#4834d4,#8356f9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
        }
        .common-btn {
            border: 1px solid rgba(138,108,255,0.4);
            color: #d0c8ff;
            background: transparent;
            padding: 8px 16px;
            border-radius: 24px;
        }

        .warn-bar {
            margin: 15px auto;
            width: 94%;
            padding: 12px;
            text-align: center;
            background: rgba(220, 80, 80, 0.12);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 10px;
            color: #ff8c8c;
            letter-spacing: 1px;
            font-size:14px;
        }

        h2 {
            font-size: 21px;
            margin: 30px 0 18px;
            padding-left: 12px;
            border-left: 4px solid #8064ff;
            color: #e6eaff;
        }

        .forum-section {
            background: rgba(24,27,52,0.72);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(130,100,255,0.18);
            box-shadow: 0 8px 26px rgba(0,0,0,0.28);
            margin-bottom: 25px;
        }
        .forum-section h3 {
            color: #d8dfff;
            margin-bottom: 15px;
            border-left: 4px solid #8064ff;
            padding-left: 10px;
            font-size: 18px;
        }
        .forum-post {
            padding: 15px;
            border-bottom: 1px solid rgba(124,92,255,0.15);
            transition: all 0.3s;
        }
        .forum-post:hover {
            background: rgba(124,92,255,0.05);
        }
        .forum-post:last-child {
            border-bottom: none;
        }
        .forum-post h4 {
            margin-bottom: 8px;
        }
        .forum-post h4 a {
            color: #e2e6ff;
            text-decoration: none;
        }
        .forum-post h4 a:hover {
            color: #8064ff;
        }
        .post-meta {
            font-size: 13px;
            color: #8991bc;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .post-meta span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .new-post-btn {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 24px;
            font-size: 14px;
            transition: 0.3s;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            cursor: pointer;
            border: none;
        }
        .new-post-btn:hover {
            box-shadow: 0 4px 14px rgba(88,62,216,0.4);
        }

        .post-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .post-modal.active {
            display: flex;
        }
        .post-modal-content {
            background: rgba(24,27,52,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(130,100,255,0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .post-modal-content h3 {
            color: #e6eaff;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .close-modal {
            background: transparent;
            border: none;
            color: #8991bc;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .close-modal:hover {
            color: #f87171;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #c5cbe8;
            font-size: 14px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(124,92,255,0.3);
            border-radius: 10px;
            background: rgba(20,23,45,0.7);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #8064ff;
            box-shadow: 0 0 15px rgba(124,92,255,0.25);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            box-shadow: 0 4px 14px rgba(88,62,216,0.4);
            transform: translateY(-2px);
        }

        .like-btn {
            background: transparent;
            border: none;
            color: #8991bc;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }
        .like-btn:hover {
            background: rgba(248,113,113,0.15);
            color: #f87171;
        }
        .like-btn.liked {
            color: #f87171;
            background: rgba(248,113,113,0.15);
        }
        .like-btn.liked .heart-icon {
            fill: #f87171;
        }

        .comment-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(124,92,255,0.1);
        }
        .comment-toggle {
            background: transparent;
            border: none;
            color: #8064ff;
            cursor: pointer;
            font-size: 13px;
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .comment-toggle:hover {
            color: #a898ff;
        }
        .comments-list {
            display: none;
            margin-top: 15px;
        }
        .comments-list.active {
            display: block;
        }
        .comment-item {
            padding: 12px;
            background: rgba(124,92,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .comment-author {
            color: #c0b4ff;
            font-size: 13px;
            font-weight: 500;
        }
        .comment-time {
            color: #7880aa;
            font-size: 12px;
        }
        .comment-content {
            color: #c5cbe8;
            font-size: 14px;
            line-height: 1.6;
        }
        .comment-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .comment-form input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid rgba(124,92,255,0.3);
            border-radius: 8px;
            background: rgba(20,23,45,0.7);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .comment-form input:focus {
            border-color: #8064ff;
        }
        .comment-form button {
            padding: 10px 20px;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .comment-form button:hover {
            box-shadow: 0 4px 12px rgba(88,62,216,0.4);
        }

        .float-tool {
            position: fixed;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 998;
        }
        .tool-item {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(35,38,70,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(124,92,255,0.3);
            color: #c8bfff;
            text-align: center;
            line-height: 42px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            font-size:14px;
            cursor:pointer;
        }

        .kanban {
            position: fixed;
            right: 15px;
            bottom: 30px;
            z-index: 997;
            cursor:pointer;
        }
        .kanban img {
            width:75px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
            border: 1px solid rgba(130,100,255,0.25);
        }

        .footer {
            background: rgba(15,18,35,0.9);
            border-top: 1px solid rgba(124,92,255,0.2);
            margin-top: 50px;
            padding: 35px 0 20px;
        }
        .footer-wrap {
            display: flex;
            justify-content: space-around;
            flex-wrap:wrap;
            gap:30px;
        }
        .footer-col {
            min-width:140px;
        }
        .footer-col h4 {
            color: #d8dfff;
            margin-bottom: 14px;
            font-size: 16px;
        }
        .footer-col a {
            display: block;
            color: #8e96c2;
            line-height: 2;
            font-size: 14px;
        }
        .copyright {
            text-align: center;
            padding-top: 20px;
            margin-top: 25px;
            border-top: 1px solid rgba(124,92,255,0.15);
            color: #7880aa;
            font-size: 13px;
            line-height:1.8;
        }

        @media (max-width:768px){
            .nav{
                flex-direction:column;
                text-align:center;
            }
            .nav-menu{
                text-align:center;
            }
            .top-info span{
                font-size:13px;
                margin-right:10px;
            }
            h2{
                font-size:19px;
            }
            .post-modal-content {
                padding: 20px;
            }
        }
        @media (max-width:480px){
            .nav-logo{
                font-size:20px;
            }
            .nav-menu a{
                font-size:13px;
                margin:3px;
                padding:5px 8px;
            }
            .login-btn a{
                padding:6px 12px;
                font-size:12px;
            }
            .float-tool{
                right:8px;
            }
            .kanban img{
                width:60px;
            }
            .footer-wrap{
                flex-direction:column;
                text-align:center;
            }
            .comment-form {
                flex-direction: column;
            }
        }
        .header.hidden {
            transform: translateY(-100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }
        .header.visible {
            transform: translateY(0);
            position: sticky;
        }
    </style>
</head>

                time: '2026-05-06 10:00'
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const topBar = document.getElementById('topBar');
            const collapseBtn = document.getElementById('collapseBtn');
            const expandTopBtn = document.getElementById('expandTopBtn');
            
            function updateCollapseState(collapsed) {
                if (topBar) {
                    if (collapsed) {
                        topBar.classList.add('collapsed');
                    } else {
                        topBar.classList.remove('collapsed');
                    }
                }
                if (collapseBtn) {
                    collapseBtn.textContent = collapsed ? '+' : '−';
                }
                if (expandTopBtn) {
                    expandTopBtn.style.display = collapsed ? 'inline-block' : 'none';
                }
            }
            
            function toggleCollapse() {
                const currentCollapsed = topBar ? topBar.classList.contains('collapsed') : false;
                const newCollapsed = !currentCollapsed;
                updateCollapseState(newCollapsed);
                localStorage.setItem('topBarCollapsed', newCollapsed);
            }
            
            const isCollapsed = localStorage.getItem('topBarCollapsed') === 'true';
            updateCollapseState(isCollapsed);
            
            if (collapseBtn) {
                collapseBtn.addEventListener('click', toggleCollapse);
            }
            if (expandTopBtn) {
                expandTopBtn.addEventListener('click', toggleCollapse);
            }

            initPosts();
            setupPostForm();
        });

        function initPosts() {
            let posts = JSON.parse(localStorage.getItem('posts'));
            if (!posts || posts.length === 0) {
                posts = defaultPosts;
                localStorage.setItem('posts', JSON.stringify(posts));
            }
            
            const hotPosts = posts.filter(p => p.category === 'hot');
            const normalPosts = posts.filter(p => p.category === 'normal');
            
            document.getElementById('hotPostsList').innerHTML = hotPosts.length > 0 
                ? hotPosts.map(p => renderPost(p)).join('')
                : '<div class="forum-post" style="text-align:center;color:#8991bc;">暂无热门帖子</div>';
            
            document.getElementById('postsList').innerHTML = normalPosts.length > 0
                ? normalPosts.map(p => renderPost(p)).join('')
                : '<div class="forum-post" style="text-align:center;color:#8991bc;">暂无创作交流帖子</div>';
        }

        function renderPost(post) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const isLiked = currentUser && post.likedBy && post.likedBy.includes(currentUser.username);
            
            return `
                <div class="forum-post" id="post-${post.id}">
                    <h4><a href="javascript:void(0);">${post.title}</a></h4>
                    <p style="color:#9fa6d2;font-size:14px;margin:8px 0;">${post.content.substring(0, 100)}${post.content.length > 100 ? '...' : ''}</p>
                    <div class="post-meta">
                        <span>👤 ${post.author}</span>
                        <span>📅 ${post.time}</span>
                        <span>👁️ ${post.views}</span>
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <svg class="heart-icon" width="14" height="14" viewBox="0 0 24 24" fill="${isLiked ? '#f87171' : 'none'}" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <span id="likes-count-${post.id}">${post.likes}</span>
                        </button>
                        <button class="comment-toggle" onclick="toggleComments('${post.id}')">
                            💬 <span id="comments-count-${post.id}">${post.comments ? post.comments.length : 0}</span> 评论
                        </button>
                    </div>
                    <div class="comment-section">
                        <div class="comments-list" id="comments-${post.id}">
                            ${renderComments(post)}
                            <div class="comment-form">
                                <input type="text" id="comment-input-${post.id}" placeholder="写下你的评论...">
                                <button onclick="submitComment('${post.id}')">发送</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderComments(post) {
            if (!post.comments || post.comments.length === 0) {
                return '<div style="color:#7880aa;font-size:13px;text-align:center;padding:10px;">暂无评论，快来抢沙发吧！</div>';
            }
            return post.comments.map(c => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author">${c.author}</span>
                        <span class="comment-time">${c.time}</span>
                    </div>
                    <div class="comment-content">${c.content}</div>
                </div>
            `).join('');
        }

        function toggleLike(postId) {
            if (!checkLogin(true)) return;
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            let posts = JSON.parse(localStorage.getItem('posts'));
            const postIndex = posts.findIndex(p => p.id === postId);
            
            if (postIndex >= 0) {
                if (!posts[postIndex].likedBy) {
                    posts[postIndex].likedBy = [];
                }
                
                const likeIndex = posts[postIndex].likedBy.indexOf(currentUser.username);
                
                if (likeIndex >= 0) {
                    posts[postIndex].likedBy.splice(likeIndex, 1);
                    posts[postIndex].likes--;
                    showNotification('取消点赞', 'success');
                } else {
                    posts[postIndex].likedBy.push(currentUser.username);
                    posts[postIndex].likes++;
                    showNotification('点赞成功！', 'success');
                }
                
                posts[postIndex].views++;
                localStorage.setItem('posts', JSON.stringify(posts));
                
                const likeBtn = document.querySelector(`#post-${postId} .like-btn`);
                const likesCount = document.getElementById(`likes-count-${postId}`);
                
                if (likeBtn && likesCount) {
                    likeBtn.classList.toggle('liked');
                    likeBtn.querySelector('.heart-icon').setAttribute('fill', likeIndex >= 0 ? 'none' : '#f87171');
                    likesCount.textContent = posts[postIndex].likes;
                }
            }
        }

        function toggleComments(postId) {
            const commentsList = document.getElementById(`comments-${postId}`);
            if (commentsList) {
                commentsList.classList.toggle('active');
            }
        }

        function submitComment(postId) {
            if (!checkLogin(true)) return;
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();
            
            if (!content) {
                showNotification('请输入评论内容', 'error');
                return;
            }
            
            let posts = JSON.parse(localStorage.getItem('posts'));
            const postIndex = posts.findIndex(p => p.id === postId);
            
            if (postIndex >= 0) {
                if (!posts[postIndex].comments) {
                    posts[postIndex].comments = [];
                }
                
                posts[postIndex].comments.push({
                    author: currentUser.username,
                    content: content,
                    time: new Date().toLocaleString()
                });
                
                localStorage.setItem('posts', JSON.stringify(posts));
                
                const commentsList = document.getElementById(`comments-${postId}`);
                const post = posts[postIndex];
                commentsList.innerHTML = renderComments(post) + `
                    <div class="comment-form">
                        <input type="text" id="comment-input-${postId}" placeholder="写下你的评论...">
                        <button onclick="submitComment('${postId}')">发送</button>
                    </div>
                `;
                
                document.getElementById(`comments-count-${postId}`).textContent = post.comments.length;
                input.value = '';
                showNotification('评论发布成功！', 'success');
            }
        }

        function openPostModal() {
            if (!checkLogin(true)) return;
            document.getElementById('postModal').classList.add('active');
        }

        function closePostModal() {
            document.getElementById('postModal').classList.remove('active');
            document.getElementById('postForm').reset();
        }

        function setupPostForm() {
            const form = document.getElementById('postForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (!currentUser) {
                    showNotification('请先登录', 'error');
                    return;
                }
                
                const title = document.getElementById('postTitle').value.trim();
                const content = document.getElementById('postContent').value.trim();
                
                if (!title || !content) {
                    showNotification('请填写完整的帖子信息', 'error');
                    return;
                }
                
                let posts = JSON.parse(localStorage.getItem('posts'));
                const newPost = {
                    id: 'p' + Date.now(),
                    title: title,
                    content: content,
                    author: currentUser.username,
                    category: 'normal',
                    likes: 0,
                    likedBy: [],
                    comments: [],
                    views: 1,
                    time: new Date().toLocaleString()
                };
                
                posts.unshift(newPost);
                localStorage.setItem('posts', JSON.stringify(posts));
                
                closePostModal();
                initPosts();
                showNotification('帖子发布成功！', 'success');
            });
        }

        (function() {
            let lastScrollY = 0;
            const header = document.getElementById('mainHeader');
            if (!header) return;
            const scrollThreshold = 100;
            let ticking = false;
            
            function handleScroll() {
                const currentScrollY = window.scrollY;
                if (currentScrollY > lastScrollY && currentScrollY > scrollThreshold) {
                    if (!header.classList.contains('hidden')) {
                        header.classList.remove('visible');
                        header.classList.add('hidden');
                    }
                } else if (currentScrollY < lastScrollY) {
                    if (header.classList.contains('hidden')) {
                        header.classList.remove('hidden');
                        header.classList.add('visible');
                    }
                }
                lastScrollY = currentScrollY;
            }
            
            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        handleScroll();
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        })();
    </script>
</body>
</html>
