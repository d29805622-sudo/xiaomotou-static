<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日签到 - 同人创作交流平台</title>
    <link rel="stylesheet" href="css/ux-enhancements.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #0c0e1a; color: #e8ebf2; line-height: 1.6; min-height: 100vh; }
        .container { width: 94%; max-width: 1380px; margin: 0 auto; }
        a { text-decoration: none; color: inherit; }

        .top-bar { background: rgba(25, 28, 48, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(138, 108, 255, 0.2); padding: 8px 0; font-size: 14px; transition: all 0.3s ease; }
        .top-bar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:8px; }
        .top-info span { margin-right: 20px; color: #b0b8d4; }
        .top-controls { display: flex; align-items: center; gap: 10px; }
        .theme-switch { cursor: pointer; padding: 4px 12px; border-radius: 20px; background: linear-gradient(135deg,#6344e8,#a864ff); font-size: 13px; }
        .collapse-btn { background: rgba(138, 108, 255, 0.3); border: 1px solid rgba(138, 108, 255, 0.5); color: #c0b4ff; border-radius: 50%; width: 26px; height: 26px; font-size: 18px; line-height: 1; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .collapse-btn:hover { background: linear-gradient(135deg, #6344e8, #a864ff); color: white; }
        .top-bar.collapsed { height: 0; padding: 0; overflow: hidden; border: none; }
        .top-bar.collapsed .container { display: none; }

        .header { background: rgba(18, 21, 39, 0.95); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(124, 92, 255, 0.18); transition: all 0.3s ease; }
        .header.hidden { transform: translateY(-100%); position: fixed; top: 0; left: 0; right: 0; }
        .header.visible { transform: translateY(0); position: sticky; }
        .nav { display: flex; justify-content: space-between; align-items: center; min-height: 60px; flex-wrap: wrap; gap:15px; padding:8px 0; }
        .nav-logo { font-size: 22px; font-weight: 700; background: linear-gradient(90deg,#7c62ff,#e288ff); -webkit-background-clip: text; color: transparent; letter-spacing: 2px; }
        .nav-menu { display: flex; flex-wrap: wrap; gap: 5px; }
        .nav-menu a { color: #c5cbe8; padding: 8px 14px; border-radius: 8px; transition: all 0.3s ease; font-size: 14px; }
        .nav-menu a:hover { background: rgba(124, 92, 255, 0.25); color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .expand-top-btn { background: rgba(138, 108, 255, 0.3); border: 1px solid rgba(138, 108, 255, 0.5); color: #c0b4ff; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: none; }
        .expand-top-btn:hover { background: linear-gradient(135deg, #6344e8, #a864ff); color: white; }
        .login-btn { display:flex; flex-wrap:wrap; gap:8px; }
        .sign-btn { background: linear-gradient(135deg,#4834d4,#8356f9); color: #fff; padding: 8px 16px; border-radius: 24px; font-size: 14px; }
        .common-btn { border: 1px solid rgba(138,108,255,0.4); color: #d0c8ff; background: transparent; padding: 8px 16px; border-radius: 24px; font-size: 14px; }

        .warn-bar { margin: 15px auto; width: 94%; padding: 12px; text-align: center; background: rgba(220, 80, 80, 0.12); border: 1px solid rgba(255,100,100,0.3); border-radius: 10px; color: #ff8c8c; letter-spacing: 1px; font-size:14px; }

        .sign-box { max-width: 600px; margin: 50px auto; background: rgba(24,27,52,0.72); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; border: 1px solid rgba(130,100,255,0.18); box-shadow: 0 8px 26px rgba(0,0,0,0.28); }
        .sign-box h2 { text-align: center; margin-bottom: 30px; font-size: 24px; color: #e6eaff; }
        .sign-status { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(124,92,255,0.1); border-radius: 14px; }
        .sign-status p { margin-bottom: 10px; color: #b8b0e2; }
        .sign-status .streak { font-size: 28px; font-weight: bold; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .sign-status .total { font-size: 18px; color: #a898ff; }
        .sign-btn-area { text-align: center; margin-bottom: 30px; }
        .sign-button { width: 200px; height: 60px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; border: none; }
        .sign-button.available { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4); }
        .sign-button.available:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5); }
        .sign-button.disabled { background: rgba(100, 100, 120, 0.5); color: #666; cursor: not-allowed; }
        .calendar-box { margin-top: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-title { font-size: 16px; color: #c5cbe8; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; background: rgba(124,92,255,0.1); color: #8991bc; }
        .calendar-day.today { background: linear-gradient(135deg, #7c62ff, #a864ff); color: white; }
        .calendar-day.signed { background: rgba(76, 175, 80, 0.3); color: #81c784; }
        .calendar-day.signed.today { background: linear-gradient(135deg, #4caf50, #66bb6a); }
        .calendar-day.other-month { opacity: 0.3; }
        .not-login { text-align: center; padding: 40px; }
        .not-login p { margin-bottom: 20px; color: #ff8c8c; }
        .not-login a { display: inline-block; padding: 10px 24px; background: linear-gradient(135deg, #583ed8, #8c64f8); color: white; border-radius: 25px; }

        .footer { background: rgba(15,18,35,0.9); border-top: 1px solid rgba(124,92,255,0.2); margin-top: 50px; padding: 35px 0 20px; }
        .copyright { text-align: center; padding-top: 20px; margin-top: 25px; border-top: 1px solid rgba(124,92,255,0.15); color: #7880aa; font-size: 13px; line-height:1.8; }
        .float-tool { position: fixed; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 10px; z-index: 998; }
        .tool-item { width: 42px; height: 42px; border-radius: 50%; background: rgba(35,38,70,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(124,92,255,0.3); color: #c8bfff; text-align: center; line-height: 42px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); font-size:14px; cursor:pointer; }
        .kanban { position: fixed; right: 15px; bottom: 30px; z-index: 997; cursor:pointer; }
        .kanban img { width:75px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.35); border: 1px solid rgba(130,100,255,0.25); }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar">
        <div class="container">
            <div class="top-info">
                <span>在线人数：实时统计</span>
                <span>今日访问：流量自动统计</span>
            </div>
            <div class="top-controls">
                <div class="theme-switch">切换显示模式</div>
                <button class="collapse-btn" id="collapseBtn">−</button>
            </div>
        </div>
    </div>

    <header class="header" id="mainHeader">
        <div class="container nav">
            <a href="index.html" class="nav-logo">同人创作平台</a>
            <div class="nav-menu">
                <a href="game.html">游戏资源</a>
                <a href="mod.html">MOD模组</a>
                <a href="play.html">在线游玩</a>
                <a href="editor.html">创作工具</a>
                <a href="forum.html">社区论坛</a>
                <a href="tool.html">素材教程</a>
                <a href="card.html">角色卡牌</a>
            </div>
            <div class="nav-right">
                <button class="expand-top-btn" id="expandTopBtn">顶部栏</button>
                <div class="login-btn">
                    <a href="sign.html" class="sign-btn">每日签到</a>
                    <a href="user.html" class="common-btn">个人中心</a>
                    <a href="login.html" class="common-btn">登录</a>
                    <a href="register.html" class="common-btn">注册</a>
                </div>
            </div>
        </div>
    </header>

    <div class="warn-bar">同人创作交流专区 禁止违规传播 严格内容自查</div>

    <div class="container" style="padding: 20px 0 50px;">
        <div class="sign-box">
            <h2>📅 每日签到</h2>
            <div id="signContent">
                <div class="not-login">
                    <p>🔄 加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="float-tool">
        <div class="tool-item" id="scrollTopBtn" style="display: none;">⬆️</div>
        <a href="help.html" class="tool-item">❓</a>
        <a href="report.html" class="tool-item">🚨</a>
    </div>

    <div class="kanban">
        <img src="images/kanban.png" alt="看板形象">
    </div>

    <footer class="footer">
        <div class="copyright">
            ©2026 同人创作交流平台 原创兴趣交流站点 | 严禁私自转载搬运
            <br>本站仅作兴趣交流，所有内容均由用户自主创作发布
        </div>
    </footer>

    <script>
        // 顶部栏折叠
        document.addEventListener('DOMContentLoaded', function() {
            const topBar = document.getElementById('topBar');
            const collapseBtn = document.getElementById('collapseBtn');
            const expandTopBtn = document.getElementById('expandTopBtn');
            
            function updateCollapseState(collapsed) {
                if (topBar) topBar.classList.toggle('collapsed', collapsed);
                if (collapseBtn) collapseBtn.textContent = collapsed ? '+' : '−';
                if (expandTopBtn) expandTopBtn.style.display = collapsed ? 'inline-block' : 'none';
            }
            
            function toggleCollapse() {
                const currentCollapsed = topBar?.classList.contains('collapsed') || false;
                updateCollapseState(!currentCollapsed);
                localStorage.setItem('topBarCollapsed', !currentCollapsed);
            }
            
            updateCollapseState(localStorage.getItem('topBarCollapsed') === 'true');
            collapseBtn?.addEventListener('click', toggleCollapse);
            expandTopBtn?.addEventListener('click', toggleCollapse);
        });

        // 导航栏滚动自动隐藏
        (function() {
            let lastScrollY = 0;
            const header = document.getElementById('mainHeader');
            if (!header) return;
            
            window.addEventListener('scroll', function() {
                const currentScrollY = window.scrollY;
                if (currentScrollY > lastScrollY && currentScrollY > 100) {
                    header.classList.remove('visible');
                    header.classList.add('hidden');
                } else if (currentScrollY < lastScrollY) {
                    header.classList.remove('hidden');
                    header.classList.add('visible');
                }
                lastScrollY = currentScrollY;
            });
        })();

        function generateCalendar(signedDates) {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay();
            
            let html = '<div class="calendar-header"><span class="calendar-title">' + year + '年' + (month + 1) + '月签到日历</span></div>';
            html += '<div class="calendar-grid">';
            
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                html += '<div class="calendar-day other-month">' + (prevMonthLastDay - i) + '</div>';
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(i).padStart(2, '0');
                const isToday = i === today.getDate();
                const isSigned = signedDates.includes(dateStr);
                
                let className = 'calendar-day';
                if (isToday) className += ' today';
                if (isSigned) className += ' signed';
                
                html += '<div class="' + className + '">' + i + '</div>';
            }
            
            html += '</div>';
            return html;
        }

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyD5KglKIReKoSCTb2oIsPM-ei2hWVSoJ94",
            authDomain: "xmt-play.firebaseapp.com",
            databaseURL: "https://xmt-play-default-rtdb.firebaseio.com",
            projectId: "xmt-play",
            storageBucket: "xmt-play.firebasestorage.app",
            messagingSenderId: "157977593826",
            appId: "1:157977593826:web:01c3715943552a579adbbb"
        };

        // 初始化 Firebase
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.database();

            auth.onAuthStateChanged(async function(user) {
                const signContent = document.getElementById('signContent');
                
                if (!user) {
                    signContent.innerHTML = '<div class="not-login"><p>🔒 需要登录后才能进行签到</p><a href="login.html">立即登录</a></div>';
                    return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                const signRef = db.ref('signData/' + user.uid);
                const snapshot = await signRef.once('value');
                const signData = snapshot.val() || { dates: [], streak: 0 };
                const streak = signData.streak || 0;
                const totalDays = signData.dates ? signData.dates.length : 0;
                const signedDates = signData.dates || [];
                const hasSignedToday = signedDates.includes(today);
                
                signContent.innerHTML = '<div class="sign-status"><p>连续签到 <span class="streak">' + streak + '</span> 天</p><p>累计签到 <span class="total">' + totalDays + '</span> 天</p></div><div class="sign-btn-area"><button class="sign-button ' + (hasSignedToday ? 'disabled' : 'available') + '" id="signButton">' + (hasSignedToday ? '✓ 今日已签到' : '点击签到') + '</button></div><div class="calendar-box">' + generateCalendar(signedDates) + '</div>';
                
                const signButton = document.getElementById('signButton');
                if (signButton && !hasSignedToday) {
                    signButton.addEventListener('click', async function() {
                        const newDates = [...signedDates];
                        newDates.push(today);
                        
                        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                        const newStreak = signedDates.includes(yesterday) ? streak + 1 : 1;
                        
                        await signRef.set({
                            dates: newDates,
                            streak: newStreak,
                            lastSignDate: today
                        });
                        
                        const userRef = db.ref('users/' + user.uid);
                        const userSnapshot = await userRef.once('value');
                        const userData = userSnapshot.val() || {};
                        const currentPoints = userData.stats?.points || 0;
                        const points = 5 + Math.min(newStreak * 2, 15);
                        
                        await userRef.update({
                            'stats/points': currentPoints + points,
                            'stats/signDays': newDates.length
                        });
                        
                        alert('🎉 签到成功！连续' + newStreak + '天，获得' + points + '积分！');
                        window.location.reload();
                    });
                }
            });
        } else {
            // Firebase 加载失败，使用本地存储
            window.onload = function() {
                const signContent = document.getElementById('signContent');
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                
                if (!currentUser) {
                    signContent.innerHTML = '<div class="not-login"><p>🔒 需要登录后才能进行签到</p><a href="login.html">立即登录</a></div>';
                    return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                const localSignData = JSON.parse(localStorage.getItem('signData_' + currentUser.email) || '{"dates":[],"streak":0}');
                const streak = localSignData.streak || 0;
                const totalDays = localSignData.dates.length;
                const signedDates = localSignData.dates || [];
                const hasSignedToday = signedDates.includes(today);
                
                signContent.innerHTML = '<div class="sign-status"><p>连续签到 <span class="streak">' + streak + '</span> 天</p><p>累计签到 <span class="total">' + totalDays + '</span> 天</p></div><div class="sign-btn-area"><button class="sign-button ' + (hasSignedToday ? 'disabled' : 'available') + '" id="signButton">' + (hasSignedToday ? '✓ 今日已签到' : '点击签到') + '</button></div><div class="calendar-box">' + generateCalendar(signedDates) + '</div>';
                
                const signButton = document.getElementById('signButton');
                if (signButton && !hasSignedToday) {
                    signButton.addEventListener('click', function() {
                        const localSignData = JSON.parse(localStorage.getItem('signData_' + currentUser.email) || '{"dates":[],"streak":0}');
                        const today = new Date().toISOString().split('T')[0];
                        
                        if (!localSignData.dates.includes(today)) {
                            localSignData.dates.push(today);
                            
                            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                            if (localSignData.dates.includes(yesterday)) {
                                localSignData.streak = (localSignData.streak || 0) + 1;
                            } else {
                                localSignData.streak = 1;
                            }
                            
                            localStorage.setItem('signData_' + currentUser.email, JSON.stringify(localSignData));
                            
                            let userStats = JSON.parse(localStorage.getItem('userStats_' + currentUser.email) || '{"points":0,"posts":0,"favorites":0,"signDays":0}');
                            const points = 5 + Math.min(localSignData.streak * 2, 15);
                            userStats.points = (userStats.points || 0) + points;
                            userStats.signDays = localSignData.dates.length;
                            localStorage.setItem('userStats_' + currentUser.email, JSON.stringify(userStats));
                            
                            alert('🎉 签到成功！连续' + localSignData.streak + '天，获得' + points + '积分！');
                            window.location.reload();
                        }
                    });
                }
            };
        }
    </script>
</body>
</html>
