<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="referrer" content="never">
    <title>每日签到 - 同人创作交流平台</title>
    <link rel="stylesheet" href="css/ux-enhancements.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: #0c0e1a;
            color: #e8ebf2;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 94%;
            max-width: 1380px;
            margin: 0 auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 顶部状态栏 */
        .top-bar {
            background: rgba(25, 28, 48, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(138, 108, 255, 0.2);
            padding: 8px 0;
            font-size: 14px;
        }
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-info span {
            margin-right: 20px;
            color: #b0b8d4;
        }
        .theme-switch {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: linear-gradient(135deg,#6344e8,#a864ff);
            font-size: 13px;
        }
        .top-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .collapse-btn {
            background: rgba(138, 108, 255, 0.3);
            border: 1px solid rgba(138, 108, 255, 0.5);
            color: #c0b4ff;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .collapse-btn:hover {
            background: linear-gradient(135deg, #6344e8, #a864ff);
            color: white;
        }
        .top-bar.collapsed {
            height: 0;
            padding: 0;
            overflow: hidden;
            border: none;
        }
        .top-bar.collapsed .container {
            display: none;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .expand-top-btn {
            background: rgba(138, 108, 255, 0.3);
            border: 1px solid rgba(138, 108, 255, 0.5);
            color: #c0b4ff;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .expand-top-btn:hover {
            background: linear-gradient(135deg, #6344e8, #a864ff);
            color: white;
        }

        /* 导航栏 */
        .header {
            background: rgba(18, 21, 39, 0.95);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(124, 92, 255, 0.18);
        }
        .header.hidden {
            transform: translateY(-100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }
        .header.visible {
            transform: translateY(0);
            position: sticky;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 60px;
            flex-wrap: wrap;
            gap:15px;
            padding:8px 0;
        }
        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg,#7c62ff,#e2e8ff);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .nav-menu a {
            color: #c5cbe8;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .nav-menu a:hover {
            background: rgba(124, 92, 255, 0.25);
            color: #fff;
        }
        .login-btn {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .sign-btn {
            background: linear-gradient(135deg,#4834d4,#8356f9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
        }
        .common-btn {
            border: 1px solid rgba(138,108,255,0.4);
            color: #d0c8ff;
            background: transparent;
            padding: 8px 16px;
            border-radius: 24px;
        }

        /* 警示条 */
        .warn-bar {
            margin: 15px auto;
            width: 94%;
            padding: 12px;
            text-align: center;
            background: rgba(220, 80, 80, 0.12);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 10px;
            color: #ff8c8c;
            letter-spacing: 1px;
            font-size:14px;
        }

        /* 签到界面 */
        .sign-box {
            background: rgba(24,27,52,0.72);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin: 40px auto;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(130,100,255,0.18);
            box-shadow: 0 8px 26px rgba(0,0,0,0.28);
        }
        .sign-box h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e6eaff;
        }
        .sign-box p {
            color: #9fa6d2;
            margin: 10px 0;
        }
        .streak-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .streak-stat {
            background: rgba(20,23,45,0.7);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(124,92,255,0.2);
        }
        .streak-stat .number {
            font-size: 28px;
            font-weight: bold;
            color: #e288ff;
        }
        .streak-stat .label {
            font-size: 13px;
            color: #8991bc;
            margin-top: 5px;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin: 30px 0;
        }
        .calendar-header {
            font-size: 12px;
            color: #8991bc;
            text-align: center;
            padding: 5px;
        }
        .calendar-day {
            padding: 12px 8px;
            background: rgba(20,23,45,0.7);
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            border: 1px solid rgba(124,92,255,0.2);
            transition: all 0.3s ease;
        }
        .calendar-day.signed {
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            border-color: #8064ff;
            color: white;
        }
        .calendar-day.today {
            border: 2px solid #e288ff;
            box-shadow: 0 0 10px rgba(226,136,255,0.3);
        }
        .calendar-day.future {
            opacity: 0.4;
        }
        .sign-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .sign-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(132,98,248,0.4);
        }
        .sign-submit:disabled {
            background: rgba(128,100,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .login-required {
            text-align: center;
            padding: 60px 20px;
        }
        .login-required h2 {
            color: #e6eaff;
            margin-bottom: 20px;
        }
        .login-required p {
            color: #9fa6d2;
            margin-bottom: 30px;
        }
        .login-required .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .login-required .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .login-required .btn-primary {
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
        }
        .login-required .btn-outline {
            border: 1px solid rgba(138,108,255,0.4);
            color: #c0b4ff;
        }
        .login-required .btn:hover {
            transform: translateY(-2px);
        }

        /* 悬浮工具栏 */
        .float-tool {
            position: fixed;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 998;
        }
        .tool-item {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(35,38,70,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(124,92,255,0.3);
            color: #c8bfff;
            text-align: center;
            line-height: 42px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            font-size:14px;
            cursor:pointer;
        }

        /* 看板娘 */
        .kanban {
            position: fixed;
            right: 15px;
            bottom: 30px;
            z-index: 997;
            cursor:pointer;
        }
        .kanban img {
            width:75px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
            border: 1px solid rgba(130,100,255,0.25);
        }

        /* 页脚 */
        .footer {
            background: rgba(15,18,35,0.9);
            border-top: 1px solid rgba(124,92,255,0.2);
            margin-top: 50px;
            padding: 35px 0 20px;
        }
        .copyright {
            text-align: center;
            padding-top: 20px;
            margin-top: 25px;
            border-top: 1px solid rgba(124,92,255,0.15);
            color: #7880aa;
            font-size: 13px;
            line-height:1.8;
        }

        /* 响应式适配 */
        @media (max-width:768px){
            .nav{
                flex-direction:column;
                text-align:center;
            }
            .nav-menu{
                text-align:center;
            }
            .top-info span{
                font-size:13px;
                margin-right:10px;
            }
            .calendar{
                gap:5px;
            }
            .calendar-day{
                padding:10px 6px;
                font-size:12px;
            }
        }
        @media (max-width:480px){
            .nav-logo{
                font-size:20px;
            }
            .nav-menu a{
                font-size:13px;
                margin:3px;
                padding:5px 8px;
            }
            .login-btn a{
                padding:6px 12px;
                font-size:12px;
            }
            .float-tool{
                right:8px;
            }
            .kanban img{
                width:60px;
            }
            .sign-box{
                padding:25px;
                margin:20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar">
        <div class="container">
            <div class="top-info">
                <span>在线人数：实时统计</span>
                <span>今日访问：流量自动统计</span>
            </div>
            <div class="top-controls">
                <div class="theme-switch">切换显示模式</div>
                <button class="collapse-btn" id="collapseBtn" title="收起顶部栏">−</button>
            </div>
        </div>
    </div>

    <header class="header" id="mainHeader">
        <div class="container nav">
            <a href="index.html" class="nav-logo">同人创作平台</a>
            <div class="nav-menu">
                <a href="game.html">游戏资源</a>
                <a href="mod.html">MOD模组</a>
                <a href="play.html">在线游玩</a>
                <a href="editor.html">创作工具</a>
                <a href="forum.html">社区论坛</a>
                <a href="tool.html">素材教程</a>
                <a href="card.html">角色卡牌</a>
            </div>
            <div class="nav-right">
                <button class="expand-top-btn" id="expandTopBtn" title="显示/隐藏顶部栏" style="display: none;">
                    顶部栏
                </button>
                <div class="login-btn" id="navButtons">
                    <a href="sign.html" class="sign-btn">每日签到</a>
                    <a href="user.html" class="common-btn">个人中心</a>
                    <a href="login.html" class="common-btn">登录</a>
                    <a href="register.html" class="common-btn">注册</a>
                </div>
            </div>
        </div>
    </header>

    <div class="warn-bar">
        同人创作交流专区 禁止违规传播 严格内容自查
    </div>

    <div class="container">
        <div id="signContent">
            <!-- 内容会由JavaScript动态填充 -->
        </div>
    </div>

    <div class="float-tool">
        <div class="tool-item" id="scrollTopBtn" title="返回顶部" style="display: none;">⬆️</div>
        <a href="help.html" class="tool-item" title="帮助中心">❓</a>
        <a href="report.html" class="tool-item" title="违规举报">🚨</a>
    </div>

    <div class="kanban">
        <img src="images/kanban.png" alt="看板形象">
    </div>

    <footer class="footer">
        <div class="copyright">
            ©2026 同人创作交流平台 原创兴趣交流站点 | 严禁私自转载搬运
            <br>本站仅作兴趣交流，所有内容均由用户自主创作发布
        </div>
    </footer>

    <script>
        // 签到页面逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const signContent = document.getElementById('signContent');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                signContent.innerHTML = `
                    <div class="login-required">
                        <h2>⚠️ 请先登录</h2>
                        <p>登录后才能进行每日签到哦～</p>
                        <div class="btn-group">
                            <a href="login.html" class="btn btn-primary">立即登录</a>
                            <a href="register.html" class="btn btn-outline">注册账号</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            const signData = JSON.parse(localStorage.getItem('signData')) || {
                dates: [],
                totalDays: 0,
                streak: 0,
                lastSignDate: null
            };
            
            const today = new Date().toISOString().split('T')[0];
            const hasSignedToday = signData.dates.includes(today);
            
            function getCalendarHTML() {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const today = new Date().getDate();
                const startWeekday = firstDay.getDay() || 7;
                
                let calendarHTML = `
                    <div class="calendar">
                        <div class="calendar-header">一</div>
                        <div class="calendar-header">二</div>
                        <div class="calendar-header">三</div>
                        <div class="calendar-header">四</div>
                        <div class="calendar-header">五</div>
                        <div class="calendar-header">六</div>
                        <div class="calendar-header">日</div>
                `;
                
                // 填充空白
                for (let i = 1; i < startWeekday; i++) {
                    calendarHTML += '<div class="calendar-day"></div>';
                }
                
                // 填充日期
                for (let day = 1; day <= lastDay.getDate(); day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isSigned = signData.dates.includes(dateStr);
                    const isToday = day === today;
                    const isFuture = day > today;
                    
                    let classes = 'calendar-day';
                    if (isSigned) classes += ' signed';
                    if (isToday) classes += ' today';
                    if (isFuture) classes += ' future';
                    
                    const content = isSigned ? '✓' : day;
                    calendarHTML += `<div class="${classes}">${content}</div>`;
                }
                
                calendarHTML += '</div>';
                return calendarHTML;
            }
            
            signContent.innerHTML = `
                <div class="sign-box">
                    <h2>📅 每日签到</h2>
                    <p>连续签到获得更多积分奖励</p>
                    
                    <div class="streak-info">
                        <div class="streak-stat">
                            <div class="number">${signData.streak}</div>
                            <div class="label">连续签到</div>
                        </div>
                        <div class="streak-stat">
                            <div class="number">${signData.totalDays}</div>
                            <div class="label">累计签到</div>
                        </div>
                        <div class="streak-stat">
                            <div class="number">${hasSignedToday ? '已签到' : '未签到'}</div>
                            <div class="label">今日状态</div>
                        </div>
                    </div>
                    
                    ${getCalendarHTML()}
                    
                    <button class="sign-submit" id="signBtn" ${hasSignedToday ? 'disabled' : ''}>
                        ${hasSignedToday ? '✅ 今日已签到' : '🎁 立即签到'}
                    </button>
                    
                    <p style="margin-top: 20px; color: #8991bc;">
                        ${hasSignedToday ? '明天再来签到吧～' : '点击按钮完成今日签到，获得积分奖励！'}
                    </p>
                </div>
            `;
            
            const signBtn = document.getElementById('signBtn');
            if (signBtn && !hasSignedToday) {
                signBtn.addEventListener('click', function() {
                    const today = new Date().toISOString().split('T')[0];
                    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                    
                    // 更新签到数据
                    signData.dates.push(today);
                    signData.totalDays++;
                    
                    // 计算连续签到
                    if (signData.lastSignDate === yesterday) {
                        signData.streak++;
                    } else if (signData.lastSignDate !== today) {
                        signData.streak = 1;
                    }
                    
                    signData.lastSignDate = today;
                    
                    localStorage.setItem('signData', JSON.stringify(signData));
                    
                    // 计算积分奖励
                    const points = 5 + Math.min(signData.streak * 2, 15);
                    
                    showNotification(`🎉 签到成功！获得 ${points} 积分！`, 'success');
                    
                    // 刷新页面显示
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                });
            }
        });
    </script>
    <script src="js/common.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
