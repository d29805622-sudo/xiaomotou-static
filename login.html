<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="referrer" content="never">
    <title>登录 - 同人创作交流平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #0c0e1a;
            color: #e8ebf2;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            width: 94%;
            max-width: 1380px;
            margin: 0 auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 顶部状态栏 */
        .top-bar {
            background: rgba(25, 28, 48, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(138, 108, 255, 0.2);
            padding: 8px 0;
            font-size: 14px;
        }
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-info span {
            margin-right: 20px;
            color: #b0b8d4;
        }

        /* 导航栏 */
        .header {
            background: rgba(18, 21, 39, 0.75);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(124, 92, 255, 0.18);
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
            flex-wrap: wrap;
            gap:15px;
            padding:10px 0;
        }
        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg,#7c62ff,#e288ff);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .nav-menu a {
            color: #c5cbe8;
            margin: 0 8px;
            padding: 7px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            display:inline-block;
        }
        .nav-menu a:hover {
            background: rgba(124, 92, 255, 0.25);
            color: #fff;
            box-shadow: 0 0 12px rgba(124, 92, 255, 0.35);
        }
        .login-btn {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .sign-btn {
            background: linear-gradient(135deg,#4834d4,#8356f9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
        }
        .common-btn {
            border: 1px solid rgba(138,108,255,0.4);
            color: #d0c8ff;
            background: transparent;
            padding: 8px 16px;
            border-radius: 24px;
        }

        /* 警示条 */
        .warn-bar {
            margin: 15px auto;
            width: 94%;
            padding: 12px;
            text-align: center;
            background: rgba(220, 80, 80, 0.12);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 10px;
            color: #ff8c8c;
            letter-spacing: 1px;
            font-size:14px;
        }

        /* 登录盒子 */
        .auth-box {
            max-width: 420px;
            margin: 50px auto;
            background: rgba(24,27,52,0.72);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(130,100,255,0.18);
            box-shadow: 0 8px 26px rgba(0,0,0,0.28);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            color: #e6eaff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #c5cbe8;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(124,92,255,0.3);
            border-radius: 10px;
            background: rgba(20,23,45,0.7);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #8064ff;
            box-shadow: 0 0 15px rgba(124,92,255,0.25);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            box-shadow: 0 4px 14px rgba(88,62,216,0.4);
            transform: translateY(-2px);
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
            color: #8991bc;
        }
        .auth-links a {
            color: #a898ff;
        }

        /* OAuth按钮 */
        .oauth-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .oauth-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(138,108,255,0.4);
            border-radius: 10px;
            background: transparent;
            color: #d0c8ff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .oauth-btn:hover {
            background: rgba(124,92,255,0.2);
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #666;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(124,92,255,0.2);
        }
        .divider span {
            padding: 0 15px;
        }

        /* 页脚 */
        .footer {
            background: rgba(15,18,35,0.9);
            border-top: 1px solid rgba(124,92,255,0.2);
            margin-top: 50px;
            padding: 35px 0 20px;
        }
        .copyright {
            text-align: center;
            padding-top: 20px;
            margin-top: 25px;
            border-top: 1px solid rgba(124,92,255,0.15);
            color: #7880aa;
            font-size: 13px;
            line-height:1.8;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="top-info">
                <span>在线人数：实时统计</span>
                <span>今日访问：流量自动统计</span>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="container nav">
            <a href="index.html" class="nav-logo">同人创作平台</a>
            <div class="nav-menu">
                <a href="game.html">游戏资源</a>
                <a href="mod.html">MOD模组</a>
                <a href="play.html">在线游玩</a>
                <a href="editor.html">创作工具</a>
                <a href="forum.html">社区论坛</a>
                <a href="tool.html">素材教程</a>
                <a href="card.html">角色卡牌</a>
            </div>
            <div class="login-btn">
                <a href="register.html" class="common-btn">注册</a>
            </div>
        </div>
    </header>

    <div class="warn-bar">
        同人创作交流专区 禁止违规传播 严格内容自查
    </div>

    <div class="container" style="padding: 20px 0 50px;">
        <div class="auth-box">
            <h2>👤 用户登录</h2>
            
            <div class="oauth-btns">
                <button class="oauth-btn">GitHub登录</button>
                <button class="oauth-btn">Google登录</button>
            </div>

            <div class="divider"><span>或使用邮箱登录</span></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>邮箱账号</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="auth-btn">登 录</button>
            </form>

            <div class="auth-links">
                <a href="#">忘记密码？</a> | 
                <a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="copyright">
            ©2026 同人创作交流平台 原创兴趣交流站点 | 严禁私自转载搬运
            <br>本站仅作兴趣交流，所有内容均由用户自主创作发布
        </div>
    </footer>

    <script>
        // 登录表单处理
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                // 获取本地存储的用户数据
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                
                // 查找匹配的用户
                const matchedUser = users.find(u => u.email === email && u.password === password);
                
                if (matchedUser) {
                    // 登录成功
                    localStorage.setItem('currentUser', JSON.stringify({
                        email: matchedUser.email,
                        username: matchedUser.username
                    }));
                    
                    alert('🎉 登录成功！\n\n欢迎回来，' + matchedUser.username);
                    window.location.href = 'index.html';
                } else {
                    alert('❌ 登录失败！\n\n可能的原因：\n1. 邮箱或密码错误\n2. 请先注册账号');
                }
            });
        }
    </script>
</body>
</html>
