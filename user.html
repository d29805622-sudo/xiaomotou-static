<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>个人中心 - 小魔头同人创作平台</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .user-profile {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 30px auto;
            max-width: 600px;
        }
        body.light-theme .user-profile {
            background: rgba(255, 255, 255, 0.95);
        }
        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--gradient-pink);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .user-info {
            text-align: center;
        }
        .user-info h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .user-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .num {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .stat-box .label {
            font-size: 14px;
            color: #999;
        }
        .menu-list {
            margin-top: 30px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        body.light-theme .menu-item {
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }
        .menu-item:hover {
            background: rgba(255, 107, 157, 0.1);
        }
        .menu-item span {
            color: #ccc;
        }
        body.light-theme .menu-item span {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="top-status">
        <div class="container">
            <span>在线人数：<i>236</i> 人</span>
            <span>今日访问：<i>5218</i></span>
        </div>
    </div>

    <header class="header">
        <div class="container nav">
            <a href="index.html" class="nav-logo">小魔头同人创作平台</a>
            <div class="login-btn">
                <a href="login.html" class="btn">登录</a>
                <a href="register.html" class="btn">注册</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="user-profile">
            <div class="user-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="user-info">
                <h2>未登录用户</h2>
                <p>登录后查看更多信息</p>
            </div>
            <div class="user-stats">
                <div class="stat-box">
                    <div class="num">0</div>
                    <div class="label">发帖数</div>
                </div>
                <div class="stat-box">
                    <div class="num">0</div>
                    <div class="label">收藏数</div>
                </div>
                <div class="stat-box">
                    <div class="num">0</div>
                    <div class="label">积分</div>
                </div>
            </div>
            <div class="menu-list">
                <div class="menu-item">
                    <span><i class="fa-solid fa-user"></i> 个人信息</span>
                    <span>→</span>
                </div>
                <div class="menu-item">
                    <span><i class="fa-solid fa-heart"></i> 我的收藏</span>
                    <span>→</span>
                </div>
                <div class="menu-item">
                    <span><i class="fa-solid fa-download"></i> 下载记录</span>
                    <span>→</span>
                </div>
                <div class="menu-item">
                    <span><i class="fa-solid fa-cog"></i> 账号设置</span>
                    <span>→</span>
                </div>
                <div class="menu-item">
                    <span><i class="fa-solid fa-sign-out-alt"></i> 退出登录</span>
                    <span>→</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="copyright">
            <p>©2026 小魔头同人二创静态网站</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
