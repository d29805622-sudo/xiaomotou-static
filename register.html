<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #0c0e1a;
            color: #e8ebf2;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            width: 94%;
            max-width: 1380px;
            margin: 0 auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 顶部状态栏 */
        .top-bar {
            background: rgba(25, 28, 48, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(138, 108, 255, 0.2);
            padding: 8px 0;
            font-size: 14px;
        }
        .top-bar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-info span {
            margin-right: 20px;
            color: #b0b8d4;
        }
        .theme-switch {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: linear-gradient(135deg,#6344e8,#a864ff);
            font-size: 13px;
        }

        /* 悬浮工具栏 */
        .float-tool {
            position: fixed;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 998;
        }
        .tool-item {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(35,38,70,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(124,92,255,0.3);
            color: #c8bfff;
            text-align: center;
            line-height: 42px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            font-size:14px;
            cursor:pointer;
        }

        /* 看板娘 */
        .kanban {
            position: fixed;
            right: 15px;
            bottom: 30px;
            z-index: 997;
            cursor:pointer;
        }
        .kanban img {
            width:75px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
            border: 1px solid rgba(130,100,255,0.25);
        }

        /* 页脚 */
        .footer {
            background: rgba(15,18,35,0.9);
            border-top: 1px solid rgba(124,92,255,0.2);
            margin-top: 50px;
            padding: 35px 0 20px;
        }
        .footer-wrap {
            display: flex;
            justify-content: space-around;
            flex-wrap:wrap;
            gap:30px;
        }
        .footer-col {
            min-width:140px;
        }
        .footer-col h4 {
            color: #d8dfff;
            margin-bottom: 14px;
            font-size: 16px;
        }
        .footer-col a {
            display: block;
            color: #8e96c2;
            line-height: 2;
            font-size: 14px;
        }

        /* 导航栏 */
        .header {
            background: rgba(18, 21, 39, 0.75);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(124, 92, 255, 0.18);
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
            flex-wrap: wrap;
            gap:15px;
            padding:10px 0;
        }
        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg,#7c62ff,#e288ff);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .nav-menu a {
            color: #c5cbe8;
            margin: 0 8px;
            padding: 7px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            display:inline-block;
        }
        .nav-menu a:hover {
            background: rgba(124, 92, 255, 0.25);
            color: #fff;
            box-shadow: 0 0 12px rgba(124, 92, 255, 0.35);
        }
        .login-btn {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .sign-btn {
            background: linear-gradient(135deg,#4834d4,#8356f9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 24px;
        }
        .common-btn {
            border: 1px solid rgba(138,108,255,0.4);
            color: #d0c8ff;
            background: transparent;
            padding: 8px 16px;
            border-radius: 24px;
        }

        /* 警示条 */
        .warn-bar {
            margin: 15px auto;
            width: 94%;
            padding: 12px;
            text-align: center;
            background: rgba(220, 80, 80, 0.12);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 10px;
            color: #ff8c8c;
            letter-spacing: 1px;
            font-size:14px;
        }

        /* 注册盒子 */
        .auth-box {
            max-width: 420px;
            margin: 50px auto;
            background: rgba(24,27,52,0.72);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(130,100,255,0.18);
            box-shadow: 0 8px 26px rgba(0,0,0,0.28);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            color: #e6eaff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #c5cbe8;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(124,92,255,0.3);
            border-radius: 10px;
            background: rgba(20,23,45,0.7);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #8064ff;
            box-shadow: 0 0 15px rgba(124,92,255,0.25);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,#583ed8,#8c64f8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            box-shadow: 0 4px 14px rgba(88,62,216,0.4);
            transform: translateY(-2px);
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
            color: #8991bc;
        }
        .auth-links a {
            color: #a898ff;
        }

        /* 页脚 */
        .footer {
            background: rgba(15,18,35,0.9);
            border-top: 1px solid rgba(124,92,255,0.2);
            margin-top: 50px;
            padding: 35px 0 20px;
        }
        .copyright {
            text-align: center;
            padding-top: 20px;
            margin-top: 25px;
            border-top: 1px solid rgba(124,92,255,0.15);
            color: #7880aa;
            font-size: 13px;
            line-height:1.8;
        }
    </style>
</head>

    <script src="js/common.js"></script>
    <script src="js/script.js"></script>
    <script>
        // 注册表单处理
        const registerForm = document.getElementById('registerForm');
        if (registerForm) {
            const usernameInput = document.getElementById('registerUsername');
            const emailInput = document.getElementById('registerEmail');
            const passwordInput = document.getElementById('registerPassword');
            const confirmPasswordInput = document.getElementById('registerConfirmPassword');
            
            // 即时验证反馈
            function validateInput(input, validator) {
                input.addEventListener('input', function() {
                    if (this.value) {
                        if (!validator(this.value)) {
                            this.style.borderColor = '#ff6b6b';
                        } else {
                            this.style.borderColor = 'rgba(124,92,255,0.3)';
                        }
                    }
                });
            }
            
            validateInput(emailInput, v => !v.includes('@'));
            validateInput(passwordInput, v => v.length < 6);
            
            confirmPasswordInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    this.style.borderColor = '#ff6b6b';
                } else {
                    this.style.borderColor = 'rgba(124,92,255,0.3)';
                }
            });
            
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // 验证所有字段
                if (!username || !email || !password || !confirmPassword) {
                    showNotification('⚠️ 请填写所有必填项', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showNotification('⚠️ 密码至少需要 6 个字符', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showNotification('❌ 两次输入的密码不一致！', 'error');
                    return;
                }
                
                // 获取已存在的用户
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                
                // 检查邮箱是否已被注册
                if (users.find(u => u.email === email)) {
                    showNotification('❌ 该邮箱已被注册！请直接登录', 'error');
                    return;
                }
                
                // 添加新用户
                const newUser = {
                    username: username,
                    email: email,
                    password: password,
                    registerTime: new Date().toLocaleString()
                };
                
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                showNotification('🎉 注册成功！欢迎加入，' + username, 'success');
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 1500);
            });
        }
    </script>
